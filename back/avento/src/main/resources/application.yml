server:
  port: 8000
  address: 127.0.0.1

avento:
  security:
    allow-non-loopback: false
  auth:
    enabled: true
    bootstrap-enabled: true
    jwt-secret: ${AVENTO_AUTH_JWT_SECRET:dev-only-change-me-avento-local-auth-secret-32-bytes}
    access-token-ttl: 20m
    refresh-token-ttl: 7d
    cookie:
      name: avento_access
      http-only: true
      secure: ${AVENTO_AUTH_COOKIE_SECURE:false}
      same-site: ${AVENTO_AUTH_COOKIE_SAME_SITE:Lax}
    root:
      enabled: ${AVENTO_AUTH_ROOT_ENABLED:true}
      email: ${AVENTO_AUTH_ROOT_EMAIL:admin@avento.local}
      password: ${AVENTO_AUTH_ROOT_PASSWORD:}
      display-name: ${AVENTO_AUTH_ROOT_DISPLAY_NAME:Avento Root}
  agent:
    max-tool-rounds: 6
    max-tool-calls: 16
    num-ctx: ${AVENTO_AGENT_NUM_CTX:8192}
    temperature: ${AVENTO_AGENT_TEMPERATURE:0.15}
    top-p: ${AVENTO_AGENT_TOP_P:0.9}
    top-k: ${AVENTO_AGENT_TOP_K:30}
    repeat-penalty: ${AVENTO_AGENT_REPEAT_PENALTY:1.08}
    enable-thinking: ${AVENTO_AGENT_ENABLE_THINKING:true}
    keep-alive: ${AVENTO_AGENT_KEEP_ALIVE:30m}
    max-tools-per-request: ${AVENTO_AGENT_MAX_TOOLS_PER_REQUEST:12}
    project-toolkit: ${AVENTO_AGENT_PROJECT_TOOLKIT:directory_tree,read_file,read_document,write_file,edit_file,delete_file,delete_directory,create_directory,search_files,terminal_run,terminal_start,terminal_logs}
    max-model-messages: ${AVENTO_AGENT_MAX_MODEL_MESSAGES:10}
    max-message-content-chars: ${AVENTO_AGENT_MAX_MESSAGE_CONTENT_CHARS:6000}
    max-total-message-content-chars: ${AVENTO_AGENT_MAX_TOTAL_MESSAGE_CONTENT_CHARS:8000}
    default-model: ${AVENTO_AGENT_DEFAULT_MODEL:qwen3:8b}
    vision-model: ${AVENTO_AGENT_VISION_MODEL:qwen2.5vl:7b}
    policy-mode: ${AVENTO_AGENT_POLICY_MODE:maximum}
    policy-override-dir: ${AVENTO_AGENT_POLICY_OVERRIDE_DIR:${user.home}/.avento/policies}
    intent-embedding-threshold: ${AVENTO_AGENT_INTENT_EMBEDDING_THRESHOLD:0.72}
    intent-embedding-timeout-ms: ${AVENTO_AGENT_INTENT_EMBEDDING_TIMEOUT_MS:2000}
  execution:
    redis:
      enabled: ${AVENTO_REDIS_EXECUTION_ENABLED:true}
      event-stream: ${AVENTO_REDIS_EVENT_STREAM:avento:events}
      agent-job-stream: ${AVENTO_REDIS_AGENT_JOB_STREAM:avento:jobs:agent}
      dead-letter-stream: ${AVENTO_REDIS_DEAD_LETTER_STREAM:avento:dead-letter}
      agent-consumer-group: ${AVENTO_REDIS_AGENT_CONSUMER_GROUP:avento-agent-workers}
      event-max-length: ${AVENTO_REDIS_EVENT_MAX_LENGTH:50000}
      event-block-timeout: ${AVENTO_REDIS_EVENT_BLOCK_TIMEOUT:2s}
      run-timeout: ${AVENTO_REDIS_RUN_TIMEOUT:15m}
      run-inactivity-timeout: ${AVENTO_REDIS_RUN_INACTIVITY_TIMEOUT:6m}
      event-ttl: ${AVENTO_REDIS_EVENT_TTL:24h}
      context-ttl: ${AVENTO_REDIS_CONTEXT_TTL:24h}
      context-message-limit: ${AVENTO_REDIS_CONTEXT_MESSAGE_LIMIT:20}
  image:
    provider: ${AVENTO_IMAGE_PROVIDER:comfyui}
    default-model: ${AVENTO_IMAGE_DEFAULT_MODEL:comfyui:RealVisXL_V5.0_fp16.safetensors}
    translation-enabled: ${AVENTO_IMAGE_TRANSLATION_ENABLED:true}
    translation-model: ${AVENTO_IMAGE_TRANSLATION_MODEL:${avento.agent.default-model}}
    translation-timeout-seconds: ${AVENTO_IMAGE_TRANSLATION_TIMEOUT_SECONDS:45}
    presets-file: ${AVENTO_IMAGE_PRESETS_FILE:${user.home}/.avento/image-presets.json}
  rag:
    similarity-threshold: ${AVENTO_RAG_SIMILARITY_THRESHOLD:0.62}
    candidate-limit: ${AVENTO_RAG_CANDIDATE_LIMIT:30}
    result-limit: ${AVENTO_RAG_RESULT_LIMIT:5}
  documents:
    markitdown-command: ${AVENTO_MARKITDOWN_COMMAND:.avento-tools/mcp/bin/markitdown}
    markitdown-mcp-command: ${AVENTO_MARKITDOWN_MCP_COMMAND:.avento-tools/mcp/bin/markitdown-mcp}
    timeout: ${AVENTO_DOCUMENT_READ_TIMEOUT:120s}
    max-output-chars: ${AVENTO_DOCUMENT_MAX_OUTPUT_CHARS:200000}
    max-file-size: ${AVENTO_DOCUMENT_MAX_FILE_SIZE:100MB}
    attachment-max-context-chars: ${AVENTO_DOCUMENT_ATTACHMENT_MAX_CONTEXT_CHARS:5000}
  comfyui:
    enabled: ${AVENTO_COMFYUI_ENABLED:true}
    base-url: ${AVENTO_COMFYUI_BASE_URL:http://127.0.0.1:8188}
    workflow: ${AVENTO_COMFYUI_WORKFLOW:classpath:comfyui/workflows/text-to-image-api.json}
    sdxl-workflow: ${AVENTO_COMFYUI_SDXL_WORKFLOW:classpath:comfyui/workflows/sdxl-text-to-image-api.json}
    sdxl-vae: ${AVENTO_COMFYUI_SDXL_VAE:sdxl_vae.safetensors}
    sdxl-openpose-model: ${AVENTO_COMFYUI_SDXL_OPENPOSE_MODEL:xinsir-openpose-sdxl-1.0.safetensors}
    sdxl-canny-model: ${AVENTO_COMFYUI_SDXL_CANNY_MODEL:xinsir-canny-sdxl-1.0.safetensors}
    sdxl-depth-model: ${AVENTO_COMFYUI_SDXL_DEPTH_MODEL:xinsir-depth-sdxl-1.0.safetensors}
    flux2-workflow: ${AVENTO_COMFYUI_FLUX2_WORKFLOW:classpath:comfyui/workflows/flux2-klein-text-to-image-api.json}
    flux2-text-encoder: ${AVENTO_COMFYUI_FLUX2_TEXT_ENCODER:qwen_3_4b.safetensors}
    flux2-vae: ${AVENTO_COMFYUI_FLUX2_VAE:flux2-vae.safetensors}
    video-workflow: ${AVENTO_COMFYUI_VIDEO_WORKFLOW:classpath:comfyui/workflows/text-to-video-api.json}
    video-diffusion-model: ${AVENTO_COMFYUI_VIDEO_DIFFUSION_MODEL:wan2.2_ti2v_5B_fp16.safetensors}
    video-text-encoder: ${AVENTO_COMFYUI_VIDEO_TEXT_ENCODER:umt5_xxl_fp8_e4m3fn_scaled.safetensors}
    video-vae: ${AVENTO_COMFYUI_VIDEO_VAE:wan2.2_vae.safetensors}
    default-model: ${AVENTO_COMFYUI_DEFAULT_MODEL:RealVisXL_V5.0_fp16.safetensors}
    image-vae: ${AVENTO_COMFYUI_IMAGE_VAE:vae-ft-mse-840000-ema-pruned.safetensors}
    openpose-model: ${AVENTO_COMFYUI_OPENPOSE_MODEL:control_v11p_sd15_openpose.pth}
    image-timeout-minutes: ${AVENTO_COMFYUI_IMAGE_TIMEOUT_MINUTES:20}
    memory-guard-enabled: ${AVENTO_COMFYUI_MEMORY_GUARD_ENABLED:true}
    adherence-min-score: ${AVENTO_COMFYUI_ADHERENCE_MIN_SCORE:85}
  mcp:
    packages:
      filesystem: ${AVENTO_MCP_FILESYSTEM_PACKAGE:@modelcontextprotocol/server-filesystem@2026.7.10}
      memory: ${AVENTO_MCP_MEMORY_PACKAGE:@modelcontextprotocol/server-memory@2026.7.4}
      sequential-thinking: ${AVENTO_MCP_SEQUENTIAL_THINKING_PACKAGE:@modelcontextprotocol/server-sequential-thinking@2026.7.4}
      desktop-commander: ${AVENTO_MCP_DESKTOP_COMMANDER_PACKAGE:@wonderwhy-er/desktop-commander@0.2.46}
      macos-automator: ${AVENTO_MCP_MACOS_AUTOMATOR_PACKAGE:@steipete/macos-automator-mcp@0.4.5}
      apple: ${AVENTO_MCP_APPLE_PACKAGE:apple-mcp@1.0.0}
      playwright: ${AVENTO_MCP_PLAYWRIGHT_PACKAGE:@playwright/mcp@0.0.78}
      chrome-devtools: ${AVENTO_MCP_CHROME_DEVTOOLS_PACKAGE:chrome-devtools-mcp@1.6.0}
      puppeteer: ${AVENTO_MCP_PUPPETEER_PACKAGE:@modelcontextprotocol/server-puppeteer@2025.5.12}
      searxng: ${AVENTO_MCP_SEARXNG_PACKAGE:mcp-searxng@1.11.1}
      dbhub: ${AVENTO_MCP_DBHUB_PACKAGE:@bytebase/dbhub@0.23.0}
    catalog:
      auto-connect: ${AVENTO_MCP_AUTO_CONNECT:filesystem,markitdown,memory,sequential-thinking,time,macos-automator,apple,playwright,chrome-devtools,puppeteer,git}
    sdk:
      enabled: ${AVENTO_MCP_SDK_ENABLED:true}
      request-timeout: ${AVENTO_MCP_SDK_REQUEST_TIMEOUT:10s}
    filesystem:
      enabled: ${AVENTO_MCP_FILESYSTEM_ENABLED:true}
    desktop-commander:
      enabled: ${AVENTO_MCP_DESKTOP_COMMANDER_ENABLED:true}
    macos-automator:
      enabled: ${AVENTO_MCP_MACOS_AUTOMATOR_ENABLED:true}
    playwright:
      enabled: ${AVENTO_MCP_PLAYWRIGHT_ENABLED:true}
    puppeteer:
      enabled: ${AVENTO_MCP_PUPPETEER_ENABLED:true}
    git:
      enabled: ${AVENTO_MCP_GIT_ENABLED:true}
    postgres:
      enabled: ${AVENTO_MCP_POSTGRES_ENABLED:true}
      connection-string: ${AVENTO_MCP_POSTGRES_CONNECTION_STRING:}
    docker:
      enabled: ${AVENTO_MCP_DOCKER_ENABLED:true}
    apple:
      enabled: ${AVENTO_MCP_APPLE_ENABLED:true}
    chrome-devtools:
      enabled: ${AVENTO_MCP_CHROME_DEVTOOLS_ENABLED:true}
    memory:
      file: ${AVENTO_MCP_MEMORY_FILE:${user.home}/.avento/memory.json}
    dbhub:
      enabled: ${AVENTO_MCP_DBHUB_ENABLED:true}
      dsn: ${AVENTO_MCP_DBHUB_DSN:}
    searxng:
      url: ${AVENTO_MCP_SEARXNG_URL:}
    docker-gateway:
      profile: ${AVENTO_MCP_DOCKER_GATEWAY_PROFILE:}
  voice:
    ffmpeg-path: /opt/homebrew/bin/ffmpeg
    whisper-binary: ""
    whisper-model: ""
    whisper-language: auto
    preferred-language: pt
    allowed-languages: pt,en,es
    whisper-prompt: ""
    whisper-carry-initial-prompt: true
    whisper-beam-size: 5
    whisper-best-of: 5
    whisper-vad-enabled: ${AVENTO_VOICE_VAD_ENABLED:true}
    whisper-vad-model: ${AVENTO_VOICE_VAD_MODEL:back/whisper.cpp/models/ggml-silero-v6.2.0.bin}
    whisper-vad-threshold: ${AVENTO_VOICE_VAD_THRESHOLD:0.50}
    whisper-vad-min-silence-ms: ${AVENTO_VOICE_VAD_MIN_SILENCE_MS:550}
    whisper-vad-speech-pad-ms: ${AVENTO_VOICE_VAD_SPEECH_PAD_MS:120}
    piper-binary: ""
    piper-model: ./piper_tts/pt_BR-faber-medium.onnx
    piper-model-pt: ${AVENTO_VOICE_PIPER_MODEL_PT:./piper_tts/pt_BR-dii-high.onnx}
    piper-model-en: ${AVENTO_VOICE_PIPER_MODEL_EN:./piper_tts/en_US-lessac-medium.onnx}
    piper-model-es: ""
    piper-length-scale: ${AVENTO_VOICE_PIPER_LENGTH_SCALE:0.95}
    piper-noise-scale: ${AVENTO_VOICE_PIPER_NOISE_SCALE:0.60}
    piper-noise-width-scale: ${AVENTO_VOICE_PIPER_NOISE_WIDTH_SCALE:0.80}
    piper-sentence-silence: ${AVENTO_VOICE_PIPER_SENTENCE_SILENCE:0.18}
    tts-cache-enabled: true
    tts-cache-ttl: PT6H

spring:
  task:
    scheduling:
      pool:
        size: 4
  data:
    redis:
      client-type: jedis
      host: ${AVENTO_REDIS_HOST:127.0.0.1}
      port: ${AVENTO_REDIS_PORT:6379}
      timeout: ${AVENTO_REDIS_TIMEOUT:2s}
  datasource:
    url: jdbc:h2:file:./avento_db
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: false
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  ai:
    ollama:
      base-url: http://localhost:11434
      embedding:
        model: nomic-embed-text
        options:
          temperature: 0.0
    vectorstore:
      redis:
        index: avento_index
        prefix: "avento:"
        initialize-schema: true
